name: Terraform Plan

on:
  pull_request:
    branches: [main]

jobs:
  plan:
    name: Terraform Plan
    runs-on: vollminlab

    steps:
      - uses: actions/checkout@v4

      - uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GITHUB_TOKEN: op://Homelab/Github-Org-PAT/password
          TF_TOKEN_app_terraform_io: op://Homelab/github-admin CI/credential

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var="github_token=$GITHUB_TOKEN"
