name: Terraform Plan

on:
  pull_request:
    branches: [main]

jobs:
  plan:
    name: Terraform Plan
    runs-on: vollminlab

    env:
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

    steps:
      - uses: actions/checkout@v6

      - uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GITHUB_TOKEN: op://Homelab/Github-Org-PAT/password
          TF_TOKEN_app_terraform_io: op://Homelab/Terraform-Cloud-Token/credential

      - name: Install Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - uses: hashicorp/setup-terraform@v4

      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/versions.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Create Terraform plugin cache dir
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var="github_token=$GITHUB_TOKEN"
